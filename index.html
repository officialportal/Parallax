<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARALLAX | Official Website</title>
    <style>
        /* --- RESET & BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace; /* Clean, minimalist aesthetic */
            color: #fff;
        }

        /* --- INTERACTIVE BACKGROUND --- */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* Allows clicks to pass through to links */
        }

        /* --- LAYOUT CONTAINER --- */
        .wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7));
        }

        /* --- NAVIGATION / HEADER --- */
        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.5rem;
            letter-spacing: 0.5rem;
            font-weight: 900;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            transition: opacity 0.3s;
        }

        .brand:hover {
            opacity: 0.5;
        }

        .store-btn {
            color: #fff;
            text-decoration: none;
            border: 1px solid #fff;
            padding: 8px 20px;
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .store-btn:hover {
            background-color: #fff;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* --- MAIN HERO --- */
        main {
            text-align: center;
            margin: auto 0;
        }

        .hero-title {
            font-size: 12vw;
            font-weight: 900;
            letter-spacing: 2rem;
            text-transform: uppercase;
            margin-right: -2rem; /* Offsets the last letter's spacing */
            line-height: 1;
            animation: fadeIn 2.5s ease-out;
            opacity: 0.95;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .hero-subtitle {
            font-size: 0.9rem;
            letter-spacing: 0.6rem;
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0.4;
            animation: fadeIn 4s ease-out;
        }

        /* --- SOCIAL LINKS / FOOTER --- */
        footer {
            width: 100%;
            max-width: 800px;
        }

        .social-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            list-style: none;
        }

        .social-grid a {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.15rem;
            text-transform: uppercase;
            opacity: 0.5;
            transition: all 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

        .social-grid a:hover {
            opacity: 1;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        /* Subtle underline animation */
        .social-grid a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: 0;
            left: 0;
            background-color: #fff;
            transition: width 0.3s ease;
        }

        .social-grid a:hover::after {
            width: 100%;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive scaling */
        @media (max-width: 768px) {
            .hero-title { font-size: 14vw; letter-spacing: 1rem; margin-right: -1rem;}
            .social-grid { gap: 15px 25px; }
            header { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="galaxyCanvas"></canvas>
    </div>

    <div class="wrapper">
        
        <header>
            <a href="#" class="brand">PARALLAX</a>
            <a href="https://boundless-official-store.printify.me/" target="_blank" class="store-btn">Shop Store</a>
        </header>

        <main>
            <h1 class="hero-title">PARALLAX</h1>
            <p class="hero-subtitle">Enter the Void</p>
        </main>

        <footer>
            <ul class="social-grid">
                <li><a href="https://www.instagram.com/parallax.x.x?igsh=eTlnM20xZW5lcDUx&utm_source=qr" target="_blank">Instagram</a></li>
                <li><a href="https://m.youtube.com/@parallax.x.x?ra=m" target="_blank">YouTube</a></li>
                <li><a href="https://x.com/Parallax_x_x" target="_blank">X (Twitter)</a></li>
                <li><a href="https://www.facebook.com/Parallax.x.x.x.x/" target="_blank">Facebook</a></li>
                <li><a href="https://www.tiktok.com/@parallax.x.x?_r=1&_t=ZT-94UGGvXVNug" target="_blank">TikTok</a></li>
                <li><a href="https://discord.com/invite/rhXuzGvM6" target="_blank">Discord</a></li>
            </ul>
        </footer>

    </div>

    <script>
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const numStars = 150;
        const stars = [];

        // Mouse coordinates for tracking interactivity
        let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        window.addEventListener('mousemove', (e) => {
            mouse.targetX = e.clientX;
            mouse.targetY = e.clientY;
        });

        // Generate properties for star nodes to construct a galaxy/nebula cluster effect
        class Star {
            constructor() {
                this.reset();
                // Randomize starting positions across the screen initially
                this.x = Math.random() * width;
                this.y = Math.random() * height;
            }

            reset() {
                this.orbitRadius = Math.random() * (Math.min(width, height) * 0.6);
                this.angle = Math.random() * Math.PI * 2;
                this.orbitSpeed = (Math.random() * 0.0005) + 0.0001;
                this.size = Math.random() * 1.5 + 0.5;
                // Grayscale/Monochrome alpha values
                this.alpha = Math.random() * 0.6 + 0.2;
            }

            update() {
                // Orbiting mechanism
                this.angle += this.orbitSpeed;
                
                // Base positions derived from cosmic center rotation
                let baseX = width / 2 + Math.cos(this.angle) * this.orbitRadius;
                let baseY = height / 2 + Math.sin(this.angle) * this.orbitRadius;

                // Parallax interactive effect: stars shift slightly based on mouse position
                // Stars closer to center move differently than stars far away
                let shiftX = (mouse.x - width / 2) * (this.orbitRadius / width) * 0.4;
                let shiftY = (mouse.y - height / 2) * (this.orbitRadius / height) * 0.4;

                this.x = baseX + shiftX;
                this.y = baseY + shiftY;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Initialize star system
        for (let i = 0; i < numStars; i++) {
            stars.push(new Star());
        }

        // Animation loop
        function animate() {
            // Smooth mouse easing
            mouse.x += (mouse.targetX - mouse.x) * 0.05;
            mouse.y += (mouse.targetY - mouse.y) * 0.05;

            // Creates a trailing/nebula illusion by not fully clearing previous frame
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
