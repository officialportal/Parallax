<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="google990317cbb4fca942" />

    <title>Parallax</title>

    <style>
        /* --- RESET & ROOT VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg-deep: #0a0a0a;
            --card-bg: rgba(18, 18, 18, 0.7);
            --border-color: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #888888;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            letter-spacing: -0.02em;
        }

        /* --- BACKGROUND LAYER --- */
        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at center, #111111 0%, #050505 100%);
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3 {
            font-weight: 900;
        }

        a {
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        /* --- SIGNATURE ENGINE LAYOUT --- */
        .custom-signature-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .signature-svg {
            overflow: visible;
            /* Atmospheric studio glowing stage shadow */
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.8))
                    drop-shadow(0 0 20px rgba(255, 255, 255, 0.2));
        }

        .signature-path {
            fill: none;
            stroke: #ffffff;
            /* Textured, hand-drawn ink pen outline stroke style */
            stroke-width: 2.5px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* --- CRYSTAL CLEAR FIXED HEADER --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(10, 10, 10, 0.5);
        }

        .logo-wrapper {
            height: 40px;
        }

        nav a {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            margin-left: 30px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        nav a:hover {
            color: var(--text-main);
        }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
