<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARALLAX | Official</title>
    <style>
        /* --- Reset & Core Aesthetics --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* --- Interactive Galaxy Canvas --- */
        #galaxy-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* --- Layout Container --- */
        .wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 24px;
            text-align: center;
        }

        /* --- Typography & Branding --- */
        header {
            margin-bottom: 60px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.6rem;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .subtitle {
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            color: #888888;
        }

        /* --- Interactive Nav/Links --- */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 60px;
        }

        .btn {
            position: relative;
            display: block;
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 0px; /* Sharp edges for a cleaner architectural look */
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.25rem;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Hover Mechanics */
        .btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* Featured Store Button Accent */
        .btn.featured {
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.07);
        }

        /* --- Minimal Social Icons Grid --- */
        .socials-grid {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            max-width: 400px;
            margin: 0 auto;
        }

        .social-link {
            color: #666666;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15rem;
            transition: color 0.3s ease;
        }

        .social-link:hover {
            color: #ffffff;
        }

        /* --- Footer --- */
        footer {
            position: relative;
            z-index: 2;
            padding: 32px;
            text-align: center;
        }

        .copyright {
            font-size: 0.65rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            color: #444444;
        }
    </style>
</head>
<body>

    <canvas id="galaxy-canvas"></canvas>

    <div class="wrapper">
        <header>
            <h1>Parallax</h1>
            <div class="subtitle">Official Platform</div>
        </header>

        <main>
            <div class="links-container">
                <a href="https://boundless-official-store.printify.me/" target="_blank" class="btn featured">Official Store</a>
                
                <a href="https://discord.com/invite/rhXuzGvM6" target="_blank" class="btn">Discord Network</a>
                <a href="https://m.youtube.com/@parallax.x.x?ra=m" target="_blank" class="btn">YouTube Channel</a>
                <a href="https://www.instagram.com/parallax.x.x?igsh=eTlnM20xZW5lcDUx&utm_source=qr" target="_blank" class="btn">Instagram</a>
            </div>

            <div class="socials-grid">
                <a href="https://x.com/Parallax_x_x" target="_blank" class="social-link">X / Twitter</a>
                <a href="https://www.tiktok.com/@parallax.x.x?_r=1&_t=ZT-94UGGvXVNug" target="_blank" class="social-link">TikTok</a>
                <a href="https://www.facebook.com/Parallax.x.x.x.x/" target="_blank" class="social-link">Facebook</a>
            </div>
        </main>
    </div>

    <footer>
        <div class="copyright">&copy; 2026 Parallax. All Rights Reserved.</div>
    </footer>

    <script>
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const numStars = 150;
        const stars = [];

        let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };

        // Handle window resizing
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Capture Mouse / Touch Coordinates for interactive tracking
        window.addEventListener('mousemove', (e) => {
            mouse.targetX = e.clientX;
            mouse.targetY = e.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                mouse.targetX = e.touches[0].clientX;
                mouse.targetY = e.touches[0].clientY;
            }
        });

        // Star Blueprint
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.5;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.speedY = (Math.random() - 0.5) * 0.2;
                this.density = (Math.random() * 20) + 10;
                this.opacity = Math.random();
                this.fadeSpeed = 0.005 + Math.random() * 0.01;
                this.direction = Math.random() > 0.5 ? 1 : -1;
            }

            update() {
                // Natural drifting movement
                this.x += this.speedX;
                this.y += this.speedY;

                // Parallax shift based on cursor interactivity
                let dx = mouse.x - (width / 2);
                let dy = mouse.y - (height / 2);
                this.x -= (dx / this.density) * 0.03;
                this.y -= (dy / this.density) * 0.03;

                // Subtle twinkling effect
                this.opacity += this.fadeSpeed * this.direction;
                if (this.opacity >= 1 || this.opacity <= 0.1) {
                    this.direction *= -1;
                }

                // Recycle stars that move completely out of boundaries
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Initialize Starfield Matrix
        for (let i = 0; i < numStars; i++) {
            stars.push(new Star());
        }

        // Animation Loop
        function animate() {
            // Clear canvas while maintaining stark contrast
            ctx.clearRect(0, 0, width, height);

            // Smooth easing for mouse tracking coordinates
            mouse.x += (mouse.targetX - mouse.x) * 0.08;
            mouse.y += (mouse.targetY - mouse.y) * 0.08;

            // Render and update every celestial asset
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
